[package]
name = "mini-redis"
version = "0.1.0"
edition = "2024"

[dependencies]
#异步运行
tokio = { version = "1.49.0", features = ["full"] }
tokio-util = { version = "0.7", features = ["codec"] }
#错误处理
anyhow = "1.0.102"

#日志
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt", "time"] }
time = { version = "0.3", features = ["formatting", "local-offset", "macros"] }
# 字节
bytes = "1"
# 高性能查找算法
memchr = "2"
# 数字转字节
itoa = "1.0"
parking_lot = "0.12.5"

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }

[[bench]]
name = "db_bench"
harness = false

[[bench]]
name = "frame_bench"
harness = false

[[bench]]
name = "command_bench"
harness = false
